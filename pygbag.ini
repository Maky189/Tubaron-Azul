[DEPENDENCIES]
# Keep the web bundle small and correct. pygbag bundles everything under the
# project folder and does NOT read .gitignore, so the local virtualenv must be
# excluded explicitly (paths are rooted at "/", hence the leading slash).
# The three raw player photos at the repo root are only inputs to
# tools/process_players.py; their processed, transparent sprites are already
# committed under assets/players/, so the browser never needs the originals.
ignoreDirs = ["/.venv", "/docs", "/tests"]
ignoreFiles = ["player.png", "player_kick.png", "vozinha.png", "_headers", "README.md", "requirements-dev.txt", "build_log.txt"]
